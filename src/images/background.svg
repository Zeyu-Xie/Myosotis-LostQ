<svg width="100%" height="100%" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Gradient for sky background -->
        <radialGradient id="skyGradient" cx="50%" cy="50%" r="80%">
            <stop offset="0%" style="stop-color:#001d3d; stop-opacity:1" />
            <stop offset="100%" style="stop-color:#000814; stop-opacity:1" />
        </radialGradient>
    </defs>

    <!-- Sky background -->
    <rect width="800" height="600" fill="url(#skyGradient)" />

    <!-- Stars with blinking effect -->
    <g fill="white">
        <!-- Each star has a unique duration and delay for random blinking -->
        <circle cx="60" cy="100" r="1.5">
            <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"
                begin="0s" />
        </circle>
        <circle cx="200" cy="150" r="1.2">
            <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"
                begin="0.5s" />
        </circle>
        <circle cx="400" cy="80" r="1.8">
            <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"
                begin="1s" />
        </circle>
        <circle cx="500" cy="300" r="1">
            <animate attributeName="opacity" values="0;1;0" dur="3.5s" repeatCount="indefinite"
                begin="1.5s" />
        </circle>
        <circle cx="700" cy="50" r="1.5">
            <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite"
                begin="2s" />
        </circle>
        <circle cx="650" cy="250" r="1.1">
            <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"
                begin="2.5s" />
        </circle>
        <circle cx="120" cy="450" r="1.6">
            <animate attributeName="opacity" values="0;1;0" dur="2.7s" repeatCount="indefinite"
                begin="3s" />
        </circle>
        <circle cx="300" cy="400" r="1.3">
            <animate attributeName="opacity" values="0;1;0" dur="3.2s" repeatCount="indefinite"
                begin="3.5s" />
        </circle>
        <circle cx="500" cy="500" r="1.2">
            <animate attributeName="opacity" values="0;1;0" dur="2.8s" repeatCount="indefinite"
                begin="4s" />
        </circle>
        <circle cx="700" cy="400" r="1.4">
            <animate attributeName="opacity" values="0;1;0" dur="3.4s" repeatCount="indefinite"
                begin="4.5s" />
        </circle>
        <circle cx="150" cy="200" r="1">
            <animate attributeName="opacity" values="0;1;0" dur="2.6s" repeatCount="indefinite"
                begin="5s" />
        </circle>
    </g>
</svg>
  